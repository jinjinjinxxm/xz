<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的分享页</title>
    <style>
        body {
            font-size: 16px;
            line-height: 1.6;
            font-family: system-ui, sans-serif;
            margin: 40px;
            color: #333;
            white-space: pre-wrap;
            /* 保留你在 txt 里敲的换行和空格 */
        }
    </style>
</head>
<body>
    <main id="content">加载中...</main>
    <script>
        fetch('./content.txt')
            .then(res => res.text())
            .then(text => {
                // trimStart() 去除 txt 文件开头的空行和空白，让第一行文字紧贴顶部（不含 body 的 margin）
                document.getElementById('content').textContent = text.trimStart();
            })
            .catch(() => {
                document.getElementById('content').textContent = '内容加载失败，请检查网络或文件。';
            });
    </script>
</body>
</html>
