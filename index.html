<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦想小镇旅游</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
    font-size: 16px;
    line-height: 1.9;
    max-width: 750px;
    margin: 0 auto 30px;
    padding: 0 20px;
    font-family: system-ui;
    white-space: pre-wrap; 
}

        main {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <main id="content">加载中...</main>
    <script>
        fetch('./content.txt')
            .then(res => res.text())
            .then(text => {
                // ===== 新增：三行洗白，把所有“异类空格”统一成普通半角空格 =====
                text = text.replace(/\u3000/g, ' ');   // 全角空格 → 半角空格
                text = text.replace(/\t/g, '    ');    // 制表符(Tab) → 4个半角空格
                text = text.replace(/\u00A0/g, ' ');   // 不间断空格(&nbsp;) → 半角空格
                // ===== 清洗完毕，下面正常显示 =====
                document.getElementById('content').textContent = text;
            })
            .catch(() => {
                document.getElementById('content').textContent = '内容加载失败，请检查文件。';
            });
    </script>
</body>
</html>
