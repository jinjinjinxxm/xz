<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦想小镇旅游</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            line-height: 1.9;
            max-width: 750px;
            margin: 0 auto 30px;
            padding: 0 20px;
            font-family: system-ui;
        }
    </style>
</head>
<body>
    <main id="content">加载中...</main>
    <script>
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
            return text.replace(/[&<>"]/g, c => map[c]);
        }

        fetch('./content.txt')
            .then(res => res.text())
            .then(text => {
                text = text.replace(/[\u3000\u00A0]/g, ' ').replace(/\t/g, '    ');

                const htmlLines = text.split('\n').map(line => {
                    let style = '';
                    if (line.includes('许愿果')) {
                        style = 'background-color: yellow;';
                    } else if (line.includes('休息')) {
                        style = 'background-color: lightgray;';
                    }

                    let escaped = escapeHtml(line);

                    // 神秘食材随机劵 → 红色
                    escaped = escaped.replace(
                        /\[神秘食材随机劵\]/g,
                        '<span style="color: red;">[神秘食材随机劵]</span>'
                    );

                    // 金骰子 → 橙色
                    escaped = escaped.replace(
                        /\[金骰子\]/g,
                        '<span style="color: orange;">[金骰子]</span>'
                    );

                    return style
                        ? `<div style="${style}">${escaped}</div>`
                        : `<div>${escaped}</div>`;
                });

                document.getElementById('content').innerHTML = htmlLines.join('');
            })
            .catch(() => {
                document.getElementById('content').textContent = '内容加载失败，请检查文件。';
            });
    </script>
</body>
</html>
